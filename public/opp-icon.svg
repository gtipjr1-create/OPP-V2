<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4A9EFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4A9EFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="dotBlur" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <!-- Glow halo -->
  <circle cx="256" cy="256" r="180" fill="url(#glowGrad)"/>

  <!-- Outer white ring -->
  <circle cx="256" cy="256" r="168"
    fill="none"
    stroke="white"
    stroke-width="10"
    stroke-opacity="0.9"/>

  <!-- Inner blue ring -->
  <circle cx="256" cy="256" r="122"
    fill="none"
    stroke="#4A9EFF"
    stroke-width="8"
    stroke-opacity="0.85"/>

  <!-- Center glow (blurred, pulsing behind dot) -->
  <circle cx="256" cy="256" r="26" fill="#4A9EFF" filter="url(#dotBlur)">
    <animate attributeName="opacity" values="0.15;0.45;0.15" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="r"       values="22;30;22"         dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="22" fill="#4A9EFF"/>

  <!-- Subtle inner glow on center dot -->
  <circle cx="256" cy="256" r="14" fill="white" fill-opacity="0.25"/>
</svg>
